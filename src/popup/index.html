<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>h4ck3r</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Compact icon sidebar */
    .icon-sidebar {
      width: 52px;
      min-width: 52px;
      background: hsl(240 10% 5%);
      border-right: 1px solid hsl(240 3.7% 15.9%);
      display: flex;
      flex-direction: column;
      padding: 8px 0;
      overflow-y: auto;
    }
    
    .icon-sidebar::-webkit-scrollbar { width: 0; }
    
    .sidebar-logo-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      color: hsl(142 76% 36%);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
      border-bottom: 1px solid hsl(240 3.7% 15.9%);
    }
    
    .icon-group {
      padding: 4px 0;
      border-bottom: 1px solid hsl(240 3.7% 12%);
    }
    
    .icon-group:last-child { border-bottom: none; }
    
    .icon-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      margin: 2px auto;
      border-radius: 8px;
      color: hsl(240 5% 64.9%);
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      background: transparent;
    }
    
    .icon-btn:hover {
      background: hsl(240 3.7% 15.9%);
      color: hsl(0 0% 98%);
    }
    
    .icon-btn.active {
      background: hsl(142 76% 36% / 0.15);
      color: hsl(142 76% 36%);
    }
    
    .icon-btn svg {
      width: 20px;
      height: 20px;
    }
    
    /* Tooltip */
    .icon-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      margin-left: 8px;
      padding: 6px 10px;
      background: hsl(240 10% 10%);
      border: 1px solid hsl(240 3.7% 20%);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: hsl(0 0% 98%);
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s, visibility 0.15s;
      z-index: 100;
    }
    
    .icon-btn:hover::after {
      opacity: 1;
      visibility: visible;
    }
    
    /* Main layout */
    .app-layout {
      display: flex;
      min-height: 100vh;
      background: hsl(240 10% 3.9%);
    }
    
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    
    .main-header {
      padding: 12px 16px;
      border-bottom: 1px solid hsl(240 3.7% 15.9%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: hsl(240 10% 5%);
    }
    
    .main-header h1 {
      font-size: 14px;
      font-weight: 600;
      color: hsl(0 0% 98%);
      margin: 0;
    }
    
    .main-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }
    
    .header-actions {
      display: flex;
      gap: 4px;
    }
    
    .header-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      color: hsl(240 5% 64.9%);
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: transparent;
    }
    
    .header-btn:hover {
      background: hsl(240 3.7% 15.9%);
      color: hsl(0 0% 98%);
    }
  </style>
</head>
<body>
  <div id="app" class="app-layout">
    <!-- Icon Sidebar -->
    <aside class="icon-sidebar">
      <div class="sidebar-logo-icon">&lt;/&gt;</div>
      
      <!-- Encoding -->
      <div class="icon-group">
        <button class="icon-btn active" data-tool="base64" data-tooltip="Base64">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7V4h16v3M9 20h6M12 4v16"/>
          </svg>
        </button>
        <button class="icon-btn" data-tool="url" data-tooltip="URL Encode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </button>
        <button class="icon-btn" data-tool="hex" data-tooltip="HEX">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <text x="12" y="15" text-anchor="middle" font-size="8" fill="currentColor" stroke="none">0x</text>
          </svg>
        </button>
        <button class="icon-btn" data-tool="html" data-tooltip="HTML Entity">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
        </button>
      </div>
      
      <!-- Hashing -->
      <div class="icon-group">
        <button class="icon-btn" data-tool="hash" data-tooltip="Hash Generator">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="4" y1="9" x2="20" y2="9"/>
            <line x1="4" y1="15" x2="20" y2="15"/>
            <line x1="10" y1="3" x2="8" y2="21"/>
            <line x1="16" y1="3" x2="14" y2="21"/>
          </svg>
        </button>
        <button class="icon-btn" data-tool="jwt" data-tooltip="JWT Decoder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </button>
      </div>
      
      <!-- Data -->
      <div class="icon-group">
        <button class="icon-btn" data-tool="json" data-tooltip="JSON Beautify">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5c0 1.1.9 2 2 2h1"/>
            <path d="M16 3h1a2 2 0 0 1 2 2v5a2 2 0 0 0 2 2 2 2 0 0 0-2 2v5a2 2 0 0 1-2 2h-1"/>
          </svg>
        </button>
        <button class="icon-btn" data-tool="timestamp" data-tooltip="Timestamp">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
      </div>
      
      <!-- Network -->
      <div class="icon-group">
        <button class="icon-btn" data-tool="modheader" data-tooltip="ModHeader">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3h7a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-7m0-18H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7m0-18v18"/>
          </svg>
        </button>
        <button class="icon-btn" data-tool="domains" data-tooltip="Domains">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
      </div>
      
      <!-- Payloads -->
      <div class="icon-group">
        <button class="icon-btn" data-tool="sqli" data-tooltip="SQL Injection">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
        </button>
        <button class="icon-btn" data-tool="xss" data-tooltip="XSS Payloads">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </button>
        <button class="icon-btn" data-tool="shells" data-tooltip="Reverse Shells">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
        </button>
        <button class="icon-btn" data-tool="lfi" data-tooltip="LFI Payloads">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </button>
      </div>
      
      <!-- Reference & Settings -->
      <div class="icon-group" style="margin-top: auto;">
        <button class="icon-btn" data-tool="commands" data-tooltip="Linux Commands">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </button>
        <button class="icon-btn" data-tool="settings" data-tooltip="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <header class="main-header">
        <h1 id="toolTitle">Base64</h1>
        <div class="header-actions">
          <button class="header-btn" id="cmdPalette" title="Search (⌘K)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
          <a href="https://github.com/4nkitd/h4ck3r" target="_blank" class="header-btn" title="GitHub">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
          </a>
        </div>
      </header>
      
      <div class="main-body">
        <div id="toolContent">
          <!-- Content rendered by JS -->
        </div>
      </div>
    </main>
  </div>
  
  <!-- Command Palette -->
  <div class="command-palette-overlay" id="commandPalette">
    <div class="command-palette">
      <div class="command-input-wrapper">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px; color: hsl(240 5% 64.9%);">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="command-input" placeholder="Search tools..." id="commandSearch">
      </div>
      <div class="command-list" id="commandList"></div>
    </div>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
  
  <script type="module" src="./main.ts"></script>
</body>
</html>
